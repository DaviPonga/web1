<!DOCTYPE html>
<html>
<head>
    <style>
        *{margin: 0;padding: 0;}
        body{min-height: 100vh;}
        .box{
            box-sizing: border-box;
            border: 1px solid black;
            text-align: center;
            line-height: 25vh;
            height: 25vh;
            width: 25vw;
            display: inline-block;
        }

        #box1{ background: rgb(45, 0, 248); }
        #box2 { background: green; }
        #box3 { background: red; }
        #box4 { background: yellow; }
    </style>
</head>
<body>
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>

</body>
</html>

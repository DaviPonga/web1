<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação do Barquinho - Atividade 6</title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
            position: relative;
        }

        /* NUVEM */
        .nuvem {
            position: absolute;
            top: 100px;
            width: 100px;
            height: 40px;
            background: #fff;
            border-radius: 50px;
            box-shadow: 
                30px -20px 0 10px #fff, 
                70px -10px 0 0px #fff;
            animation: moverNuvem 25s linear infinite;
            opacity: 0.9;
        }

        @keyframes moverNuvem {
            from { left: -200px; }
            to { left: 110vw; }
        }

        /* BARCO */
        #barco {
            position: absolute;
            bottom: 50px; /* Ajustado levemente para "entrar" na água */
            width: 120px;
            height: 120px;
            z-index: 20; /* Aumentado para ficar na frente de tudo */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            
            animation: 
                navegar 15s linear infinite, 
                balancar 3s ease-in-out infinite;
        }

        @keyframes navegar {
            from { left: -150px; }
            to { left: 110vw; }
        }

        @keyframes balancar {
            0%, 100% { transform: rotate(-5deg) translateY(0); }
            50% { transform: rotate(8deg) translateY(-15px); }
        }

        /* MAR */
        .mar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 120px;
            background-color: #1976D2;
            z-index: 10; /* Menor que o do barco */
        }

        .mar::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 200%;
            height: 40px;
            background: radial-gradient(circle at 20px 40px, transparent 20px, #1976D2 21px);
            background-size: 40px 80px;
            animation: moverOndas 2s linear infinite;
            z-index: 25; /* Opcional: as cristas das ondas na frente do barco */
        }

        @keyframes moverOndas {
            from { transform: translateX(0); }
            to { transform: translateX(-40px); }
        }
    </style>
</head>
<body>

    <div class="nuvem"></div>

    <div id="barco">⛵</div>

    <div class="mar"></div>
  
</body>
</html>

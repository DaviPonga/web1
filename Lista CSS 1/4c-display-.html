<!DOCTYPE html>
<html>
<head>
    <style>
        .box{
            width: 80px;
            height: 80px;
            position: fixed;
            color: black;
            text-align: center;
            line-height: 80px;
            font-size: 20px;
        }

        #box1{
            background: rgb(0, 255, 13);
            top: 0px;
            left: 0px;
        }

        #box2{
            background: rgb(253, 152, 0);
            top: 0px;
            right: 0px;
        }

        #box3{
            background: rgb(31, 207, 238);
            bottom: 0px;
            left: 0px;
        }

        #box4{
            background: rgb(255, 0, 200);
            bottom: 0px;
            right: 0px;
            animation: rotacao 5s linear 0s infinite;
        }

        #box5{
            background: rgb(255, 0, 0);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes rotacao{
            0%{}
            100%{transform: rotate(360deg);}
        }
    </style>
</head>
<body>

<div class="box" id="box1">1</div>
<div class="box" id="box2">2</div>
<div class="box" id="box3">3</div>
<div class="box" id="box4">4</div>
<div class="box" id="box5">5</div>

</body>
</html>

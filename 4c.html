<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color: rgb(63, 63, 62);
            position: relative;
        }
        .Estrelas{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
        }

    </style>
</head>
<body>
    <div class="Estrelas">🌠</div>
</body>
</html>

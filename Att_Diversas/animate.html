<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação </title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #coracao {
            display: inline-block;
            animation: voar 2s linear infinite;
        }

        img {
            width: 10vw;
            border-radius: 10px;
            animation: voar 1s linear 0s infinite;
        }

        @keyframes voar {
            0% {
                font-size: 10px;
                transform: rotate(0deg);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                font-size: 120px;
                transform: rotate(360deg);
                opacity: 0;
            }
        }

        #foguete {
            display: inline-block;
            position: fixed;
            bottom: 0px;
            left: 0px;
            font-size: 40pt;
            transform: rotate(-45deg);
            animation: lancamento 4s ease-in infinite;
        }

        @keyframes lancamento {
            from {}
            to{
                bottom: 100vh;
                left: 0px; 
               
            }
        }
    </style>
</head>
<body>
    
    <img src="./web/Imagens/d0olly.jpg" alt="">
    <span id="coracao">❤️</span>
    <span id="foguete">🚀</span>
  
</body>
</html>

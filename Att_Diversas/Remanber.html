<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        .container{display: flex;
            height: 100vh;
           flex-direction: row;
            justify-content: space-around;/* controla exibiçãp no eixo do flex*/;
            align-items:center;/*Eixo perpendicular no flex-direction*/;
    }
    .box{background-color: rgb(126, 149, 163);
    border: 1px solid orange;
    flex-grow: 1;
    }
    .box:hover{flex-grow: 5;
    transition: all 3s;
    }
    #box-div-1{order: -6;}
    #box-div-3{order: -4;}
    #box-div-5{order: -5;}

    </style>
</head>
<body>

<div class="container">
    <div class="box" id="box-div-1">1</div>
    <div class="box" id="box-div-2">2</div>
    <div class="box" id="box-div-3">3</div>
    <div class="box" id="box-div-4">4</div>
    <div class="box" id="box-div-5">5</div>
</div>

<div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
</div>

</body>
</html>

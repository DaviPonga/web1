<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 100px;
            height: 100px;
            background-color: gray;
            border-top-color: black;
            border-top-width: 10px;
            border-top-style: solid;

            border-top: 10px solid orange;
            border-left: 10px solid rgb(0, 255, 76);
            border-right: 10px solid rgb(255, 30, 0);
            border-bottom: 10px solid rgb(55, 0, 255);
            border-radius: 100% 52% 93% 40%;
            margin: 10px;

            outline: 5px dotted crimson;
            outline-offset: 10px;
        }
    </style>
</head>
<body>
        <div class="box">box</div>
</body>
</html>

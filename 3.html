<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bandeiras</title>

    <style>
        body{
            background-color: rgb(223, 223, 233);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1{
            margin: 10px 0;
        }

        .Fundo{
            background-color: white;
            width: 410px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
        }

        .VermelhoJ{
            background-color: red;
            border-radius: 50%;
            width: 90px;
            height: 90px;
        }

        .BandeiraA{
            width: 410px;
            height: 200px;
            display: flex;
            flex-direction: column;
            margin-top: 50px;
        }

        .linha{
            flex: 1;
        }

        .pretoA{ background: black; }
        .vermelhoA{ background: red; }
        .amareloA{ background: yellow; }

        .BandeiraF{
            width: 410px;
            height: 200px;
            display: flex;
            margin-top: 50px;
        }

        .coluna{
            flex: 1;
        }

        .azulF{ background: blue; }
        .brancoF{ background: white; }
        .vermelhoF{ background: red; }

    </style>
</head>

<body>

    <div class="Fundo">
        <div class="VermelhoJ"></div>
    </div>
    <h1>Bandeira do Japão</h1>

    <div class="BandeiraA">
        <div class="linha pretoA"></div>
        <div class="linha vermelhoA"></div>
        <div class="linha amareloA"></div>
    </div>
    <h1>Bandeira da Alemanha</h1>

    <div class="BandeiraF">
        <div class="coluna azulF"></div>
        <div class="coluna brancoF"></div>
        <div class="coluna vermelhoF"></div>
    </div>
    <h1>Bandeira da França</h1>

</body>
</html>

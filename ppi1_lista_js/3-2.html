<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuada</title>
    <style>
        #tabuada{border: 1px solid black;}
    </style>
</head>
<body>
    <h1>Tabuada</h1>
    <label for="ntabuada"></label>
    <input type="number" id="ntabuada">
    <button>Calcular</button>

    <div id="Tabuada"></div>


    <script>
        let button =document.querySelector("button")

        button.addEventListener("click", ()=>{
        let numero = document.getElementById("ntabuada").value;
        let divTabuada = document.getElementById("Tabuada");
        
        let Resultado = "";
        for(let i = 1; i<=10; i++){
            let multiplicador = numero * i;
            Resultado += numero + "x" + i + "=" + multiplicador + "<br>";
        }

        divTabuada.innerHTML = Resultado;
        })
            </script>
</body>
</html>

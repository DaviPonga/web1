<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Canvas</title>
</head>
<body>

    <h1>Desenho com Canvas</h1>

    <canvas id="meuCanvas" width="400" height="300" style="border:1px solid #000;"></canvas>

    <script>
        let canvas = document.getElementById("meuCanvas");
        let ctx = canvas.getContext("2d");

        // Retângulo
        ctx.fillStyle = "blue";
        ctx.fillRect(50, 50, 100, 80);

        // Círculo
        ctx.beginPath();
        ctx.arc(250, 100, 40, 0, Math.PI * 2);
        ctx.fillStyle = "red";
        ctx.fill();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cálculo de IMC</title>
</head>
<body>

  <h1>Cálculo de IMC</h1>

  <p>Nome: <input type="text" id="nome"></p>
  <p>Peso (kg): <input type="number" id="peso" step="0.1"></p>
  <p>Altura (m): <input type="number" id="altura" step="0.01"></p>

  <button onclick="calcular()">Calcular</button>

  <p id="resultadoIMC"></p>
  <p id="classificacao"></p>

  <img id="imgPerfil" width="150">

  <script>
    function calcular() {
      const nome = document.getElementById("nome").value;
      const peso = document.getElementById("peso").value;
      const altura = document.getElementById("altura").value;

      if (nome === "" || peso === "" || altura === "") {
        alert("Preencha todos os campos!");
        return;
      }

      const pesoNum = parseFloat(peso);
      const alturaNum = parseFloat(altura);
      const imc = pesoNum / (alturaNum * alturaNum);

      document.getElementById("resultadoIMC").textContent = "IMC de " + nome + ": " + imc.toFixed(2);

      let classificacao = "";

      if (imc < 18.5) {
        classificacao = "Abaixo do peso";
      } else if (imc < 25) {
        classificacao = "Peso normal";
      } else if (imc < 30) {
        classificacao = "Sobrepeso";
      } else if (imc < 35) {
        classificacao = "Obesidade grau 1";
      } else if (imc < 40) {
        classificacao = "Obesidade grau 2";
      } else {
        classificacao = "Obesidade grau 3 (mórbida)";
      }

      document.getElementById("classificacao").textContent = classificacao;

      const faixa = Math.floor(imc);
      let imagem = "";

      switch (true) {
        case faixa < 18:
          imagem = "abaixopeso.png";
          break;
        case faixa < 25:
          imagem = "normal.png";
          break;
        case faixa < 30:
          imagem = "sobrepeso.png";
          break;
        case faixa < 35:
          imagem = "obesidade1.png";
          break;
        case faixa < 40:
          imagem = "obesidade2.png";
          break;
        default:
          imagem = "obesidade3.png";
      }

      document.getElementById("imgPerfil").src = "./imgs/" + imagem;
    }
  </script>

</body>
</html>

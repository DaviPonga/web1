<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Local Storage</title>
</head>
<body>

    <input type="text" id="nameInput" placeholder="Digite seu nome">
    <button id="saveButton">Salvar</button>

    <p id="greeting"></p>

    <script>
        let nomeSalvo = localStorage.getItem("nome");

        if (nomeSalvo) {
            document.getElementById("greeting").innerHTML = "Olá, " + nomeSalvo;
        }

        document.getElementById("saveButton").onclick = function () {
            let nome = document.getElementById("nameInput").value;

            localStorage.setItem("nome", nome);

            document.getElementById("greeting").innerHTML = "Olá, " + nome;
        };
    </script>

</body>
</html>

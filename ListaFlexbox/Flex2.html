<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html{border: 3px solid purple;
        border-radius: 8px;
        height: 1000px;
        width: 50vh;
        
        }
        .container{
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: white;
            align-items: center;
        }
        .linha{
            background-color: rgb(184, 179, 179);
            height: 15px;
            border-radius: 4px;
        }
        .linhas{
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 30px;
            gap: 10px;
        }
        .Titulo{
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;

        }
        .LogoBaixo{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            height: 50vh;
            justify-content: flex-end;
        }
        .circulo{
            width: 80px;
            height: 80px;
            background-color: rgb(197, 189, 189);
            border-radius: 50%;
        }
        .nome{
            width: 120px;
            height: 15px;
            background-color: rgb(202, 188, 188);
            border-radius: 4px;
        }

    </style>
</head>
<body>
    <div class="container">
        
            <h2>Company Logo</h2>
            <div class="linhas">
                <div class="linha"></div>
                <div class="linha"></div>
                <div class="linha"></div>
                <div class="linha"></div>
        </div>
        <div class="LogoBaixo">
            <div class="circulo"></div>
            <div class="nome"></div>
    </div>
</body>
</html>
